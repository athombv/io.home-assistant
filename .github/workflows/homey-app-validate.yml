name: Validate Homey App
on:
  workflow_dispatch:

jobs:
  main:
    name: Validate Homey App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: athombv/github-action-homey-app-validate@master
        with:
          level: verified
